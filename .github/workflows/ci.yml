name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --verbose
      - name: cargo test
        run: cargo test --verbose

  hook-smoke:
    name: pre-commit hook smoke
    runs-on: ubuntu-latest
    # Cheap regression net for .githooks/pre-commit. Runs in parallel with
    # the heavy `test` job — no Rust toolchain needed, just shell + git.
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck pre-commit hook
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./.githooks
          severity: error
      - name: hook is executable
        run: test -x .githooks/pre-commit
      - name: hook short-circuits on empty index
        run: |
          scratch=$(mktemp -d)
          (
            cd "$scratch"
            git init -q
            git config user.email "ci@vellum.test"
            git config user.name "ci"
            cp "$GITHUB_WORKSPACE/.githooks/pre-commit" pre-commit
            sh pre-commit
          )

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
        continue-on-error: true
