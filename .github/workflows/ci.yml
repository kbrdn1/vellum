name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --verbose
      - name: cargo test
        run: cargo test --verbose

  it-db:
    name: it-db (postgres + mysql)
    runs-on: ubuntu-latest
    # The `it-db` feature gate runs the server-backed integration tests
    # (#10 PostgreSQL, #11 MySQL). Kept out of the default `test` job so a plain
    # `cargo test` needs no Docker; here Postgres + MySQL services back them.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          # Ephemeral CI service: trust auth — no password needed, and no
          # credential-shaped literal lands in the repo. The DB dies with the job.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: testdb
          # Ephemeral CI service: no root password (the DB dies with the job),
          # so no credential-shaped literal lands in the repo.
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --features it-db
        run: cargo test --features it-db --verbose
        env:
          VELLUM_IT_PG_DSN: postgres://postgres@localhost:5432/postgres
          VELLUM_IT_MYSQL_DSN: mysql://root@localhost:3306/testdb

  hook-smoke:
    name: pre-commit hook smoke
    runs-on: ubuntu-latest
    # Cheap regression net for .githooks/pre-commit. Runs in parallel with
    # the heavy `test` job — no Rust toolchain needed, just shell + git.
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck pre-commit hook
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./.githooks
          severity: error
      - name: hook is executable
        run: test -x .githooks/pre-commit
      - name: hook short-circuits on empty index
        run: |
          scratch=$(mktemp -d)
          (
            cd "$scratch"
            git init -q
            git config user.email "ci@vellum.test"
            git config user.name "ci"
            cp "$GITHUB_WORKSPACE/.githooks/pre-commit" pre-commit
            sh pre-commit
          )

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
        continue-on-error: true
