# vellum — worktree bootstrap for vellum (Rust)
#
# Placeholders supported in paths/patterns: {repo} {home} {repo_path}
# {repo_parent} {type} {issue} {desc}. {repo_parent} = the dir containing the
# repo. `base = "{repo_parent}/worktrees/{repo}"` mirrors Zed's default
# git.worktree_directory = "../worktrees": Zed resolves it relative to the repo
# then appends the repo dir name (zed-industries/zed#53673), so both land
# worktrees in <repo_parent>/worktrees/<repo>/… — same on-disk location.
# Docs: https://github.com/kbrdn1/vellum

[worktree]
base           = "{repo_parent}/worktrees/{repo}"
path_pattern   = "{type}-{issue}-{desc}"
branch_pattern = "{type}/#{issue}-{desc}"

# -- target/ isolation -------------------------------------------------------
# cargo writes incremental build artefacts under `target/`. If two worktrees
# share the same `target/` (symlinked from main), `cargo build` from one
# clobbers the other's build graph and triggers spurious recompilations.
# Force each worktree to keep its own local `target/`.
[[bootstrap.no_symlink]]
path = "target"

# -- direnv activation -------------------------------------------------------
# If the repo ever grows a Nix flake / `.envrc`, allow it on bootstrap.
[[bootstrap.command]]
name = "direnv allow"
run  = "direnv allow ."
when = "file_exists:.envrc"

# -- cargo fetch -------------------------------------------------------------
# Warm the dependency cache so the first `cargo build` inside the worktree
# doesn't re-download crates. Cheap, network-only, idempotent.
[[bootstrap.command]]
name = "cargo fetch"
run  = "cargo fetch"
when = "file_exists:Cargo.toml"

# -- TUI `R: review` launcher (issue #75) ------------------------------------
# Press `R` in the worktree list to review the selected branch against its
# resolved base (upstream → branch.<n>.vellum-base → default_base → dev → main).
# `lumen` preset = `lumen diff {base}..{head}` fullscreen suspend-and-resume.
[review]
tool = "lumen"

# -- TUI macros (issue #290) -------------------------------------------------
# Two user-defined commands fired from the worktree list, run in the selected
# worktree's directory. `open_in` defaults to `pty` (embedded overlay, TUI
# suspends until exit). Dev shortcuts for hacking on vellum itself:
#   h → wipe this worktree's `target/` (each worktree keeps its own, see above)
#   H → (re)install the vellum binary from this worktree's sources
[tui.macro1]
command = "cargo clean"

[tui.macro2]
command = "cargo install --path ."

# ── exec / clean profiles for the TUI overlays (x / X) — issue #325 ──────────
[exec.profiles.test]
command = ["cargo", "test"]
[exec.profiles.build]
command = ["cargo", "build"]
[exec.profiles.clippy]
command = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]
[exec.profiles.fmt]
command = ["cargo", "fmt"]

[clean.profiles.target]
dirs = ["target"]
